# MinIO storage (S3-compatible local)
app.storage.minio.endpoint=${APP_STORAGE_MINIO_ENDPOINT:http://localhost:9000}
app.storage.minio.access-key=${APP_STORAGE_MINIO_ACCESS_KEY:minioadmin}
app.storage.minio.secret-key=${APP_STORAGE_MINIO_SECRET_KEY:minioadmin}
app.storage.minio.bucket=${APP_STORAGE_MINIO_BUCKET:bizplay-files}
app.storage.minio.request-folder=${APP_STORAGE_MINIO_REQUEST_FOLDER:request-files}
app.storage.minio.fail-fast=${APP_STORAGE_MINIO_FAIL_FAST:false}
app.storage.public-base-path=${APP_STORAGE_PUBLIC_BASE_PATH:/classifier/api/v1/storage/files}


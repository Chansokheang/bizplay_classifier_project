spring.application.name=bizplay_classifier_api

# Load environment variables from .env. Spring resolves file imports relative
# to the process working directory, so include the common launch locations:
# project root, src/main, src/main/resources, and target/classes.
# OS env vars still take precedence; .env only supplies values that are not
# already set, which then resolve the ${VAR:default} placeholders below.
spring.config.import=optional:file:./.env[.properties]

# MyBatis
mybatis.type-handlers-package=com.api.bizplay_classifier_api.config

# Disable Docker Compose auto-start (connecting to local PostgreSQL directly)
spring.docker.compose.enabled=false

# Do not auto-create Spring Session JDBC tables
spring.session.jdbc.initialize-schema=never

# jdbc datasource properties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bizplay}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / chatbot persistence
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger UI readability
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.default-models-expand-depth=-1
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Flyway is available for the copied chatbot project, but this integrated app
# keeps using schemaV2.sql as the authoritative bootstrap script.
spring.flyway.enabled=false

# Spring AI / PGVector
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:not-used}
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.initialize-schema=false

# Base64-encoded AES key (16, 24, or 32 bytes after decoding)
app.encryption.base64-key=${APP_ENCRYPTION_BASE64_KEY:}

# Base64-encoded 32-byte HMAC key for JWT signing
app.jwt.base64-secret=${APP_JWT_BASE64_SECRET:,A#s5i=1n0Q.EVLSH,A!9)(lxtuOU+R@i3?]ZM,%^1W=}
app.auth.mode=${APP_AUTH_MODE:static}
app.auth.static-token=${APP_AUTH_STATIC_TOKEN:enabled}

# email properties

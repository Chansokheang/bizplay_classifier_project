services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "9005:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schemaV2.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9006:9000"
      - "9007:9001"
    volumes:
      - minio_data:/data

  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "9008:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      APP_ENCRYPTION_BASE64_KEY: ${APP_ENCRYPTION_BASE64_KEY}
      APP_JWT_BASE64_SECRET: ${APP_JWT_BASE64_SECRET}
      APP_AUTH_MODE: ${APP_AUTH_MODE}
      APP_AUTH_STATIC_TOKEN: ${APP_AUTH_STATIC_TOKEN}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      APP_STORAGE_MINIO_ENDPOINT: ${APP_STORAGE_MINIO_ENDPOINT}
      APP_STORAGE_MINIO_ACCESS_KEY: ${APP_STORAGE_MINIO_ACCESS_KEY}
      APP_STORAGE_MINIO_SECRET_KEY: ${APP_STORAGE_MINIO_SECRET_KEY}
      APP_STORAGE_MINIO_BUCKET: ${APP_STORAGE_MINIO_BUCKET}
      APP_STORAGE_MINIO_REQUEST_FOLDER: ${APP_STORAGE_MINIO_REQUEST_FOLDER}
      APP_STORAGE_MINIO_FAIL_FAST: ${APP_STORAGE_MINIO_FAIL_FAST}
      APP_STORAGE_PUBLIC_BASE_PATH: ${APP_STORAGE_PUBLIC_BASE_PATH}
      APP_AI_FALLBACK_ENABLED: ${APP_AI_FALLBACK_ENABLED}
      APP_AI_FALLBACK_URL: ${APP_AI_FALLBACK_URL}
      APP_AI_FALLBACK_API_KEY: ${APP_AI_FALLBACK_API_KEY}
      APP_AI_FALLBACK_CONNECT_TIMEOUT_MS: ${APP_AI_FALLBACK_CONNECT_TIMEOUT_MS}
      APP_AI_FALLBACK_READ_TIMEOUT_MS: ${APP_AI_FALLBACK_READ_TIMEOUT_MS}
      APP_AI_FALLBACK_MAX_CONTEXT_CANDIDATES: ${APP_AI_FALLBACK_MAX_CONTEXT_CANDIDATES}
      APP_AI_FALLBACK_OPENAI_URL: ${APP_AI_FALLBACK_OPENAI_URL}
      APP_AI_FALLBACK_GEMINI_URL_TEMPLATE: ${APP_AI_FALLBACK_GEMINI_URL_TEMPLATE}
      APP_AI_FALLBACK_CLAUDE_URL: ${APP_AI_FALLBACK_CLAUDE_URL}
      SPRING_MVC_ASYNC_REQUEST_TIMEOUT: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT}
      SERVER_MAX_HTTP_REQUEST_HEADER_SIZE: ${SERVER_MAX_HTTP_REQUEST_HEADER_SIZE}

volumes:
  postgres_data:
  minio_data:

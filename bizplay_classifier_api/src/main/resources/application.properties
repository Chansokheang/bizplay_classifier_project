# multipart upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# allow larger Authorization/Cookie headers before Tomcat rejects request parsing
server.max-http-request-header-size=64KB

# Async request timeout (5 minutes for long-running AI operations)
spring.mvc.async.request-timeout=300000

# Tomcat connection timeout (5 minutes)
#server.connection-timeout=300000

# MinIO storage (S3-compatible local)
app.storage.minio.endpoint=${APP_STORAGE_MINIO_ENDPOINT:http://localhost:9000}
#app.storage.minio.endpoint=${APP_STORAGE_MINIO_ENDPOINT:http://minio:9000}
app.storage.minio.access-key=${APP_STORAGE_MINIO_ACCESS_KEY:minioadmin}
app.storage.minio.secret-key=${APP_STORAGE_MINIO_SECRET_KEY:minioadmin}
app.storage.minio.bucket=${APP_STORAGE_MINIO_BUCKET:bizplay-files}
app.storage.minio.request-folder=${APP_STORAGE_MINIO_REQUEST_FOLDER:request-files}
app.storage.minio.fail-fast=${APP_STORAGE_MINIO_FAIL_FAST:false}
app.storage.public-base-path=${APP_STORAGE_PUBLIC_BASE_PATH:/api/v1/storage/files}

